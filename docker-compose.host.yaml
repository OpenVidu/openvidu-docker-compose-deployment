services:
  openvidu:
    network_mode: host
    networks: !reset ""
    environment:
      # Override container-hostname refs so openvidu reaches redis/mongo on the host loopback
      - REDIS_HOST=127.0.0.1:6379
      - LIVEKIT_OPENVIDU_ANALYTICS_MONGO_URL=mongodb://${MONGO_ADMIN_USERNAME:?mandatory}:${MONGO_ADMIN_PASSWORD:?mandatory}@127.0.0.1:27017/?directConnection=true

  redis:
    ports:
      - "6379:6379"   # openvidu (on host network) reaches redis via 127.0.0.1:6379

  mongo:
    ports:
      - "27017:27017"  # openvidu (on host network) reaches mongo via 127.0.0.1:27017

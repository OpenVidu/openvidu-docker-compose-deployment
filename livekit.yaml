# OpenVidu configuration
openvidu:
    analytics:
        enabled: true
        interval: 10s
        expiration: 768h # 32 days
        # Setted via environment variable in docker-compose.yml
        # mongo_url:

# LiveKit configuration
port: 7880
prometheus_port: 6789
bind_addresses:
    - ""
rtc:
    port_range_start: 50000
    port_range_end: 60000
    use_external_ip: true
redis:
    username: ""
    db: 0
    use_tls: false
    # Setted via environment variable in docker-compose.yml
    # address:
    # password:
turn:
    enabled: true
    udp_port: 443
    tls_port: 5349
    external_tls: true
    relay_range_start: 40000
    relay_range_end: 50000
webhook:
    urls:
        - http://host.docker.internal:9080/livekit/webhook
logging:
    # Logging level for the LiveKit server.
    # Values: debug, info, warn, error.
    # Default: info.
    level: info

    # Logging level for the Pion WebRTC engine.
    # Values: trace, debug, info, warn, error.
    # Default: error.
    pion_level: warn
